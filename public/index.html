<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#06060e" />
		<title>Wormhole</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<canvas id="bg-shader" width="800" height="600"></canvas>

		<header>
			<div class="header-left">
				<span class="header-title">Wormhole</span>
			</div>
			<button id="session-btn" class="session-btn" title="Switch session">
				<div class="session-top">
					<span id="session-name" class="session-name">claude</span>
					<span id="ws-dot" class="ws-dot"></span>
				</div>
				<span class="session-hint">Tap to switch</span>
			</button>
			<div class="header-right">
				<button id="settings-btn" title="Settings" aria-label="Settings">
					<i data-lucide="settings" aria-hidden="true"></i>
				</button>
				<button
					id="tts-toggle"
					title="Toggle text-to-speech"
					aria-label="Toggle text-to-speech"
				>
					<i data-lucide="volume-off" class="tts-off" aria-hidden="true"></i>
					<i data-lucide="volume-2" class="tts-on" aria-hidden="true"></i>
				</button>
			</div>
		</header>

		<!-- Session modal -->
		<div id="session-modal" class="modal-backdrop" hidden>
			<div class="modal">
				<h2 class="modal-title">Sessions</h2>
				<div id="session-list" class="session-list"></div>
				<div class="session-create">
					<input
						type="text"
						id="session-new-name"
						class="settings-input"
						placeholder="New session name..."
						maxlength="20"
						autocomplete="off"
						autocorrect="off"
						autocapitalize="off"
						spellcheck="false"
					/>
					<button id="session-create-btn" class="session-create-btn">
						Create
					</button>
				</div>
				<p id="session-error" class="session-error" hidden></p>
			</div>
		</div>

		<main id="output"></main>

		<!-- Settings panel -->
		<div id="settings-panel" class="settings-panel" hidden>
			<div class="settings-backdrop"></div>
			<div class="settings-drawer">
				<div class="settings-header">
					<h2>Settings</h2>
					<button id="settings-close" aria-label="Close settings">
						<i data-lucide="x" aria-hidden="true"></i>
					</button>
				</div>
				<div class="settings-body">
					<div class="settings-section">
						<h3>Theme</h3>
						<div id="theme-list" class="theme-list"></div>
					</div>

					<div class="settings-section">
						<h3>Accent Color</h3>
						<div id="color-list" class="color-list"></div>
					</div>

					<div class="settings-section">
						<h3>Text-to-Speech</h3>
						<label class="settings-row">
							<span class="settings-label">Reads</span>
							<select id="tts-mode" class="settings-select">
								<option value="summary">Summary</option>
								<option value="full">Full response</option>
							</select>
						</label>
						<label class="settings-row">
							<span class="settings-label">Speed</span>
							<input
								type="range"
								id="tts-rate"
								min="0.5"
								max="2"
								step="0.1"
								value="1.1"
								class="settings-range"
							/>
							<span id="tts-rate-value" class="settings-value">1.1x</span>
						</label>
						<label class="settings-row">
							<span class="settings-label">Voice</span>
							<select id="tts-voice" class="settings-select">
								<option value="">System Default</option>
							</select>
						</label>
					</div>

					<div class="settings-section">
						<h3>Terminal</h3>
						<label class="settings-row">
							<span class="settings-label">Auto columns</span>
							<input
								type="checkbox"
								id="auto-cols"
								class="settings-checkbox"
								checked
							/>
						</label>
						<label class="settings-row" id="cols-row">
							<span class="settings-label">Columns</span>
							<input
								type="range"
								id="cols-slider"
								min="40"
								max="200"
								step="1"
								value="80"
								class="settings-range"
							/>
							<span id="cols-value" class="settings-value">80</span>
						</label>
					</div>

					<div class="settings-section">
						<h3>Skills</h3>
						<div id="skills-chips" class="chips"></div>
						<input
							type="text"
							id="skills-add"
							class="settings-input"
							placeholder="Add skill..."
							autocomplete="off"
							autocorrect="off"
							autocapitalize="off"
							spellcheck="false"
						/>
						<p class="settings-hint">
							Added skills appear in the command palette.
						</p>
					</div>
				</div>
			</div>
		</div>

		<!-- Command palette -->
		<div id="cmd-palette" class="cmd-palette" hidden>
			<div class="cmd-backdrop"></div>
			<div class="cmd-drawer">
				<div class="cmd-header">
					<h2>Commands</h2>
					<input
						type="text"
						id="cmd-search"
						class="cmd-search"
						placeholder="Search..."
						autocomplete="off"
						autocorrect="off"
						autocapitalize="off"
						spellcheck="false"
					/>
					<button id="cmd-close" aria-label="Close commands">
						<i data-lucide="x" aria-hidden="true"></i>
					</button>
				</div>
				<div class="cmd-body" id="cmd-list"></div>
			</div>
		</div>

		<footer>
			<div id="image-previews"></div>

			<!-- Modifier combo overlay -->
			<div id="mod-overlay" class="mod-overlay" hidden>
				<span id="mod-combo-label" class="mod-combo-label"></span>
				<input
					type="text"
					id="mod-input"
					class="mod-input"
					maxlength="1"
					autocomplete="off"
					autocorrect="off"
					autocapitalize="off"
					spellcheck="false"
				/>
				<button id="mod-cancel" class="key-btn key-btn--label mod-cancel">
					<i data-lucide="x" aria-hidden="true"></i>
				</button>
			</div>

			<!-- Claude Code key layout -->
			<div id="cc-keys" class="key-layout" hidden>
				<div class="key-row">
					<button
						class="key-btn"
						data-key="Up"
						title="Up arrow"
						aria-label="Up arrow"
					>
						<i data-lucide="chevron-up" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Down"
						title="Down arrow"
						aria-label="Down arrow"
					>
						<i data-lucide="chevron-down" aria-hidden="true"></i>
					</button>
					<button class="key-btn key-btn--label" data-key="Enter" title="Enter">
						<i data-lucide="corner-down-left" aria-hidden="true"></i>
						<span>Enter</span>
					</button>
					<button
						class="key-btn key-btn--label key-btn--esc"
						data-key="Escape"
						title="Interrupt"
					>
						<i data-lucide="x" aria-hidden="true"></i>
						<span>Esc</span>
					</button>
					<button
						class="key-btn key-btn--label key-btn--grow"
						data-raw="BTab"
						title="Shift+Tab"
						aria-label="Shift+Tab"
					>
						<span>Shift+Tab</span>
					</button>
					<button
						class="key-btn keys-expand"
						title="More keys"
						aria-label="More keys"
					>
						<i data-lucide="ellipsis" aria-hidden="true"></i>
					</button>
				</div>

				<div class="key-row key-row--extra" hidden>
					<button
						class="key-btn"
						data-key="Left"
						title="Left arrow"
						aria-label="Left arrow"
					>
						<i data-lucide="chevron-left" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Right"
						title="Right arrow"
						aria-label="Right arrow"
					>
						<i data-lucide="chevron-right" aria-hidden="true"></i>
					</button>
					<button class="key-btn key-btn--label" data-key="Tab" title="Tab">
						<i data-lucide="arrow-right-to-line" aria-hidden="true"></i>
						<span>Tab</span>
					</button>
					<button
						class="key-btn key-btn--label"
						data-raw="C-o"
						title="Ctrl+O (expand)"
					>
						<span>Ctrl+O</span>
					</button>
					<button
						class="key-btn key-btn--label key-btn--esc"
						data-raw="C-c"
						title="Ctrl+C (kill)"
					>
						<span>Ctrl+C</span>
					</button>
					<button
						class="key-btn key-btn--label"
						data-raw="C-d"
						title="Ctrl+D (EOF)"
					>
						<span>Ctrl+D</span>
					</button>
				</div>
			</div>

			<!-- Terminal key layout -->
			<div id="term-keys" class="key-layout">
				<div class="key-row">
					<button class="key-btn" data-key="Up" title="Up" aria-label="Up">
						<i data-lucide="chevron-up" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Down"
						title="Down"
						aria-label="Down"
					>
						<i data-lucide="chevron-down" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Left"
						title="Left"
						aria-label="Left"
					>
						<i data-lucide="chevron-left" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Right"
						title="Right"
						aria-label="Right"
					>
						<i data-lucide="chevron-right" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn"
						data-key="Enter"
						title="Enter"
						aria-label="Enter"
					>
						<i data-lucide="corner-down-left" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn key-btn--esc"
						data-key="Escape"
						title="Escape"
						aria-label="Escape"
					>
						<i data-lucide="x" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn key-btn--label key-btn--mod"
						data-mod="C"
						title="Ctrl modifier"
					>
						<span>Ctrl</span>
					</button>
					<button
						class="key-btn keys-expand"
						title="More keys"
						aria-label="More keys"
					>
						<i data-lucide="ellipsis" aria-hidden="true"></i>
					</button>
				</div>

				<div class="key-row key-row--extra" hidden>
					<button class="key-btn key-btn--label" data-key="Home" title="Home">
						<span>Home</span>
					</button>
					<button class="key-btn key-btn--label" data-key="End" title="End">
						<span>End</span>
					</button>
					<button
						class="key-btn key-btn--label"
						data-key="PgUp"
						title="Page Up"
					>
						<span>PgUp</span>
					</button>
					<button
						class="key-btn key-btn--label"
						data-key="PgDn"
						title="Page Down"
					>
						<span>PgDn</span>
					</button>
					<button class="key-btn" data-key="Tab" title="Tab" aria-label="Tab">
						<i data-lucide="arrow-right-to-line" aria-hidden="true"></i>
					</button>
					<button
						class="key-btn key-btn--label key-btn--mod"
						data-mod="M"
						title="Alt modifier"
					>
						<span>Alt</span>
					</button>
					<button
						class="key-btn key-btn--label key-btn--mod"
						data-mod="S"
						title="Shift modifier"
					>
						<span>Shift</span>
					</button>
				</div>
			</div>

			<div class="composer">
				<div class="composer-inner">
					<label
						id="image-btn"
						title="Attach image"
						role="button"
						aria-label="Attach image"
					>
						<input
							type="file"
							id="image-input"
							accept="image/*"
							multiple
							hidden
						/>
						<i data-lucide="image" aria-hidden="true"></i>
					</label>

					<textarea
						id="text-input"
						name="message"
						rows="1"
						placeholder="Drift a thought..."
					></textarea>

					<button
						id="mic-btn"
						title="Voice dictation"
						aria-label="Voice dictation"
					>
						<i data-lucide="mic" aria-hidden="true"></i>
					</button>

					<button id="send-btn" title="Send message" aria-label="Send message">
						<i data-lucide="send" aria-hidden="true"></i>
					</button>
				</div>
			</div>
		</footer>

		<script src="/app.js"></script>
	</body>
</html>
